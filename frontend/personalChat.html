<!DOCTYPE html>
<html>

<head>
  <title>Personal Chat</title>

  <style>

    #chat-box{
      width:400px;
      height:400px;
      border:1px solid #ccc;
      overflow-y:auto;
      padding:10px;
      margin-top:10px;
    }

    .message{
      margin:10px 0;
      padding:8px;
      border-radius:8px;
      max-width:70%;
    }

    .sent{
      background:#d4f8d4;
      margin-left:auto;
      text-align:right;
    }

    .received{
      background:#f1f1f1;
      margin-right:auto;
      text-align:left;
    }

  </style>
</head>

<body>

<h2>Personal Chat</h2>

<input
  type="text"
  id="searchEmail"
  placeholder="Enter user email"
/>

<button onclick="joinRoom()">
  Start Chat
</button>

<div id="chat-box"></div>

<input
  type="text"
  id="messageInput"
  placeholder="Type message"
/>

<button onclick="sendMessage()">
  Send
</button>


<script src="http://localhost:3000/socket.io/socket.io.js"></script>
<script src="js/personalChat.js"></script>

</body>
</html>
