<style>

body{
  font-family: Arial, sans-serif;
  margin:0;
  padding:20px;
  background:#f4f6f8;
}

/* TOP CONTROLS */
#top-controls{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

#group-box,
#email-search-box{
  display:flex;
  gap:8px;
}

#group-box input,
#email-search-box input{
  padding:8px;
  border:1px solid #ccc;
  border-radius:5px;
}

#group-box button,
#email-search-box button{
  padding:8px 12px;
  cursor:pointer;
}

/* CHAT CONTAINER */
#chat-container{
  width:420px;
  margin:auto;
  border-radius:10px;
  background:white;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
  padding:10px;
}

/* MESSAGE AREA */
#chat-box{
  height:420px;
  overflow-y:auto;
  border:1px solid #ddd;
  padding:10px;
  margin-bottom:10px;
  background:#fafafa;
}

/* MESSAGE STYLE */
.message{
  margin:10px 0;
  padding:10px 12px;
  border-radius:10px;
  max-width:70%;
  font-size:14px;
}

.sent{
background:#dcf8c6;
margin-left:auto;
text-align:right;
}

.received{
background:#eee;
margin-right:auto;
text-align:left;
}


/* MEDIA */
.message img,
.message video{
  max-width:200px;
  border-radius:8px;
  margin-top:5px;
}

/* FILE ICON */
.file-link{
  display:flex;
  align-items:center;
  gap:6px;
  text-decoration:none;
  color:#333;
}

/* MESSAGE INPUT AREA */
#message-area{
  display:flex;
  align-items:center;
  gap:8px;
}

#messageInput{
  flex:1;
  padding:10px;
  border:1px solid #ccc;
  border-radius:6px;
}

/* FILE BUTTON */
.file-btn{
  background:#eee;
  border:none;
  padding:8px;
  border-radius:6px;
  cursor:pointer;
}

.send-btn{
  background:#4CAF50;
  color:white;
  border:none;
  padding:10px 14px;
  border-radius:6px;
  cursor:pointer;
}

</style>


<body>

<div id="top-controls">

<!-- GROUP JOIN -->
<div id="group-box">
<input type="text" id="groupName" placeholder="Enter group name">
<button onclick="joinGroup()">Join Group</button>
</div>

<!-- PERSONAL CHAT -->
<div id="email-search-box">
<input type="text" id="searchEmail" placeholder="Enter user email">
<button onclick="joinRoom()">Join Chat</button>
</div>

</div>

<!-- <div id="messages" style="height:400px; border:1px solid gray; overflow-y:auto; padding:10px;"></div> -->
<!-- CHAT BOX -->
<div id="chat-container">

<div id="chat-box"></div>

<div id="message-area">

<input type="text" id="messageInput" placeholder="Type message">

<label class="file-btn">
Choose File
<input type="file" id="mediaFile" hidden onchange="showFileName()">
</label>

<span id="fileName" style="font-size:12px;color:gray;"></span>

<button class="send-btn" onclick="send()">Send</button>

<a href="${url}" target="_blank">📄 Download File</a>

</div>




</div>

</div>

<script src="http://localhost:3000/socket.io/socket.io.js"></script>
<script src="js/chat.js"></script>

</body>
